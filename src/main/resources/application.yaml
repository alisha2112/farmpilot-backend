spring:
  application:
    name: farmpilot-backend
  datasource:
    url: jdbc:postgresql://localhost:5431/farmpilot_db
    username: farmpilot_app
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration