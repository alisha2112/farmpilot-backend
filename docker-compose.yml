version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmpilot_postgres
    environment:
      POSTGRES_USER: farmpilot_app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farmpilot_db
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - farmpilot_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: farmpilot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@farmpilot.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - farmpilot_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  farmpilot_network:
    driver: bridge